defaults:
  - data: brats2023
  - model: encoder
  - _self_

seed: 2024
optimizer:
  lr: 1e-4
  weight_decay: 1e-4
scheduler:
  warmup_steps: 500
loss:
  sigreg_weight: 0.09
trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  gradient_clip_val: 1.0
callbacks:
  system_monitoring:
    _target_: jedi.training.callbacks.SystemMonitoringCallback
    log_interval: 50
  embedding_statistics:
    _target_: jedi.training.callbacks.EmbeddingStatisticsCallback
    log_interval: 100
  prediction_quality:
    _target_: jedi.training.callbacks.PredictionQualityCallback
    log_interval: 100
  sigreg_monitor:
    _target_: jedi.training.callbacks.SIGRegMonitor
    log_interval: 50
