defaults:
  - data: brats2023
  - model: encoder
  - _self_

seed: 2024
optimizer:
  lr: 1e-4
  weight_decay: 1e-4
scheduler:
  warmup_steps: 500
loss:
  sigreg_weight: 0.09
trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  gradient_clip_val: 1.0
wandb:
  enabled: true
  project: jedi
  name: encoder_stage
  save_dir: /data/experiment/junran/jedi/logs
callbacks:
  training_dynamics:
    _target_: jedi.training.callbacks.TrainingDynamicsCallback
    log_interval: 50
  embedding_statistics:
    _target_: jedi.training.callbacks.EmbeddingStatisticsCallback
    log_interval: 100
  prediction_quality:
    _target_: jedi.training.callbacks.PredictionQualityCallback
    log_interval: 100
  latent_eval_metrics:
    _target_: jedi.training.callbacks.LatentEvalMetricsCallback
    log_interval: 100
  sigreg_monitor:
    _target_: jedi.training.callbacks.SIGRegMonitor
    log_interval: 50
