defaults:
  - data: brats2023
  - model: encoder
  - model@decoder_model: decoder
  - _self_

seed: 2024
optimizer:
  lr: 1e-4
  weight_decay: 1e-4
scheduler:
  warmup_steps: 500
trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  gradient_clip_val: 1.0
callbacks:
  training_dynamics:
    _target_: jedi.training.callbacks.TrainingDynamicsCallback
    log_interval: 50
  reconstruction_eval_metrics:
    _target_: jedi.training.callbacks.ReconstructionEvalMetricsCallback
    data_range: 2.0
    log_train: false
    log_interval: 100
