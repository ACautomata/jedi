defaults:
  - data: brats2023
  - model: encoder
  - model@decoder_model: vis_decoder
  - trainer: default
  - _self_

seed: 2024
optimizer:
  lr: 1e-4
  weight_decay: 0.01
scheduler:
  warmup_steps: 500
wandb:
  enabled: true
  project: jedi
  name: decoder_stage
  save_dir: ???
callbacks:
  training_dynamics:
    _target_: jedi.training.callbacks.TrainingDynamicsCallback
    log_interval: 50
  reconstruction_eval_metrics:
    _target_: jedi.training.callbacks.ReconstructionEvalMetricsCallback
    data_range: 2.0
    log_train: false
    log_interval: 100
